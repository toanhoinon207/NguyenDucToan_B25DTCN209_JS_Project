<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Tài Chính Cá Nhân</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/index.css">
</head>

<body>
    <header>
        <div class="header">
            <div class="left">📒 Tài Chính Cá Nhân K25_Rikkei</div>
            <div class="right">
                <span>Tài khoản</span>
                <img src="./assets/images/arrow.png">
            </div>
        </div>
    </header>
    <div class="container">
        <div class="sidebar">
            <a href="../index.html" class="active">
                <img src="../assets/images/Vector (12).png" alt="">
                <p class="text">Information</p>
            </a>
            <a href="../pages/category.html">
                <img src="../assets/images/Vector (6).png" alt="">
                <p>Category</p>
            </a>
            <a href="../pages/history.html">
                <img src="../assets/images/Vector (7).png" alt="">
                <p>History</p>
            </a>
        </div>
        <div class="content">
            <section id="info" class="tab active">
                <section class="banner">
                    <h2>🎯 Kiểm soát chi tiêu thông minh</h2>
                    <p>Theo dõi ngân sách và thu chi hằng tháng dễ dàng</p>
                </section>
                <h2 class="dashboard-title">📊 Quản Lý Tài Chính Cá Nhân</h2>
                <div class="card center">
                    <p>Số tiền còn lại</p>
                    <h3 class="money">0 VND</h3>
                </div>
                <div class="card">
                    <label>📅 Chọn tháng:</label>
                    <input type="month">
                </div>
                <div class="card">
                    <label>💰 Ngân sách tháng:</label>
                    <input type="number" placeholder="VD: 5000000">
                    <button class="btn-primary">Lưu</button>
                </div>
                <div class="profile-card">
                    <h3 class="profile-title">Quản Lý Thông tin cá nhân</h3>
                    <div class="profile-form">
                        <div class="form-group">
                            <label>Name *</label>
                            <input type="text" value="Nguyen Van A">
                        </div>
                        <div class="form-group">
                            <label>Email *</label>
                            <input type="email" value="nguyenvana@gmail.com">
                        </div>
                        <div class="form-group">
                            <label>Phone *</label>
                            <input type="text" value="0987654321">
                        </div>
                        <div class="form-group">
                            <label>Gender *</label>
                            <input type="text" value="Male">
                        </div>
                    </div>
                    <div class="profile-actions">
                        <button class="btn-outline">Change Information</button>
                        <button class="btn-outline">Change Password</button>
                    </div>
                </div>
            </section>
        </div>
    </div>
    <footer>
        © 2026 Quản Lý Tài Chính Cá Nhân. by Nguyễn Đức Toàn!
    </footer>
</body>
<script src="./js/index.js"></script>
</html>
