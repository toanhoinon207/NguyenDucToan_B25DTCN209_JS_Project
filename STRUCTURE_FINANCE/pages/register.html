<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/register.css">
</head>
    <body>
        <div class="auth">
            <div class="auth-card">
                <form class="auth-form">
                    <h2 class="auth-title">Sign Up</h2>
                    <p class="success">Sign In Successfully</p>
                    <div class="form-group" id="email">
                        <input type="text" placeholder="email here ...">
                        <small class="error"></small>
                    </div>
                    <div class="form-group" id="password">
                        <input type="password" placeholder="Password here ...">
                        <small class="error"></small>
                    </div>
                    <div class="form-group" id="re-password">
                        <input type="password" placeholder="Confirm password here ...">
                        <small class="error"></small>
                    </div>
                    <button type="button" class="btn-success" onclick="accountRegister()">Sign Up</button>
                    <div class="auth-footer">
                        You have account?
                        <a href="./login.html">Sign in</a>
                    </div>
                </form>
            </div>
        </div>
    </body>
    <script src="../js/register.js"></script>
</html>
